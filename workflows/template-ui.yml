# Template workflow for Cloudflare Pages repos (sennacc/ui)
# Copy to .github/workflows/ci.yml in the target repo
# Replace: project-name, health-url
# TODO(P1-E): sennacc/deploy/actions/*@v1 is a floating ref — a push to main instantly
# affects all 29 consumer repos. Pin to a semver tag (e.g. @v1) once the first release
# is cut. Track in: https://github.com/sennacc/deploy/issues (version pinning)

name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, stage]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [production, preview]
        default: production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@v1

      - uses: sennacc/deploy/actions/lint-typecheck-test@v1

  build:
    name: Build Next.js
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@v1

      - uses: sennacc/deploy/actions/build-pages@v1
        with:
          working-directory: .
          output-dir: out

      - name: Upload build artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72af3b9d33e4d5bea034563ba6  # v4.6.0
        with:
          name: pages-out
          path: out/
          retention-days: 1

  deploy:
    name: Deploy CF Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@v1

      - name: Download build artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: pages-out
          path: out/

      - uses: sennacc/deploy/actions/deploy-pages@v1
        id: deploy
        with:
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cloudflare-email: ${{ secrets.CLOUDFLARE_EMAIL }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: senna-command-center  # REPLACE with actual project name
          directory: out
          health-url: https://painel.sennacc.com  # REPLACE with actual health URL

  preview:
    name: Deploy PR Preview
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@v1

      - name: Download build artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: pages-out
          path: out/

      - uses: sennacc/deploy/actions/deploy-pages@v1
        id: preview
        with:
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cloudflare-email: ${{ secrets.CLOUDFLARE_EMAIL }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: senna-command-center  # REPLACE with actual project name
          directory: out
          branch: pr-${{ github.event.pull_request.number }}

      - name: Comment PR with preview URL
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${{ steps.preview.outputs.deployment-url }}`
            })
