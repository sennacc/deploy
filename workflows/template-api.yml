# Template workflow for Cloudflare Worker repos (sennacc/api, sennacc/gateway)
# Copy to .github/workflows/ci.yml in the target repo
# Replace: HEALTH_CHECK_URL var, worker name in notify-hill target
# TODO(P1-E): sennacc/deploy/actions/*@main is a floating ref — a push to main instantly
# affects all 29 consumer repos. Pin to a semver tag (e.g. @v1) once the first release
# is cut. Track in: https://github.com/sennacc/deploy/issues (version pinning)

name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, stage]
  workflow_dispatch:
    inputs:
      force-deploy:
        description: Deploy even without code changes
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@main
        with:
          working-directory: .

      - uses: sennacc/deploy/actions/lint-typecheck-test@main
        with:
          working-directory: .

  deploy:
    name: Deploy CF Worker
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: sennacc/deploy/actions/setup-node@main

      - name: Capture pre-deploy worker version
        id: pre-deploy
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          # SEC-02 FIX: capture version via GITHUB_OUTPUT — not /tmp
          PREV_VERSION=$(npx wrangler versions list --json 2>/dev/null \
            | jq -r '.[1].id // empty' || echo "")
          echo "prev-version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Pre-deploy version ID: $PREV_VERSION"

      - name: Build
        run: npm run build

      - uses: sennacc/deploy/actions/deploy-worker@main
        id: deploy
        with:
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cloudflare-email: ${{ secrets.CLOUDFLARE_EMAIL }}
          working-directory: .
          environment: production

      - uses: sennacc/deploy/actions/health-check@main
        id: health
        with:
          url: ${{ vars.HEALTH_CHECK_URL }}
          max-retries: '10'
          retry-delay: '6'
          require-body-ok: 'true'

      - name: Rollback Worker on health check failure
        if: failure() && steps.health.outcome == 'failure'
        uses: sennacc/deploy/actions/rollback-worker@main
        with:
          cloudflare-api-key: ${{ secrets.CLOUDFLARE_API_KEY }}
          cloudflare-email: ${{ secrets.CLOUDFLARE_EMAIL }}
          version-id: ${{ steps.pre-deploy.outputs.prev-version }}

      - uses: sennacc/deploy/actions/tag-release@main
        if: success()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
