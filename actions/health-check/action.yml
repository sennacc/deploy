name: Health Check
description: Verify endpoint returns expected HTTP status with retry. Validates body.status == "ok" when present.

inputs:
  url:
    description: Full URL to health check endpoint
    required: true
  max-retries:
    description: Maximum number of retry attempts
    required: false
    default: '10'
  retry-delay:
    description: Seconds to wait between retries
    required: false
    default: '6'
  expected-status:
    description: Expected HTTP status code
    required: false
    default: '200'
  require-body-ok:
    description: Fail if body.status != "ok" (for API endpoints that return structured health responses)
    required: false
    default: 'false'

outputs:
  response-time:
    description: Response time of the final successful check in milliseconds
    value: ${{ steps.check.outputs.response-time }}
  status-code:
    description: Final HTTP status code received
    value: ${{ steps.check.outputs.status-code }}

runs:
  using: composite
  steps:
    - name: Health check with retry
      id: check
      shell: bash
      run: |
        MAX_RETRIES=${{ inputs.max-retries }}
        RETRY_DELAY=${{ inputs.retry-delay }}
        EXPECTED_STATUS=${{ inputs.expected-status }}
        REQUIRE_BODY_OK=${{ inputs.require-body-ok }}
        URL="${{ inputs.url }}"
        ATTEMPT=0

        echo "Health check: $URL"
        echo "Max retries: $MAX_RETRIES, delay: ${RETRY_DELAY}s, require body.status=ok: $REQUIRE_BODY_OK"

        while [ $ATTEMPT -lt $MAX_RETRIES ]; do
          ATTEMPT=$((ATTEMPT + 1))
          START_TIME=$(date +%s%3N)

          BODY=$(curl -sf \
            --max-time 10 \
            --connect-timeout 5 \
            "$URL" 2>/dev/null || echo "")

          HTTP_CODE=$(curl -s -o /dev/null \
            -w "%{http_code}" \
            --max-time 10 \
            --connect-timeout 5 \
            "$URL" 2>/dev/null || echo "000")

          END_TIME=$(date +%s%3N)
          RESPONSE_TIME=$((END_TIME - START_TIME))

          echo "Attempt $ATTEMPT/$MAX_RETRIES — HTTP $HTTP_CODE (${RESPONSE_TIME}ms)"

          if [ "$HTTP_CODE" = "$EXPECTED_STATUS" ]; then
            # SEC-10: validate body.status == "ok" — not just HTTP 200
            BODY_STATUS=$(echo "$BODY" | jq -r '.status' 2>/dev/null || echo "")

            if [ "$REQUIRE_BODY_OK" = "true" ] && [ "$BODY_STATUS" != "ok" ]; then
              echo "FAIL: HTTP $HTTP_CODE but body.status='$BODY_STATUS' (expected 'ok')"
              if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                echo "Waiting ${RETRY_DELAY}s before retry..."
                sleep "$RETRY_DELAY"
                continue
              fi
              break
            fi

            if [ -n "$BODY_STATUS" ] && [ "$BODY_STATUS" != "ok" ]; then
              echo "WARN: HTTP $HTTP_CODE but body.status='$BODY_STATUS' (expected 'ok' — set require-body-ok=true to hard fail)"
            fi

            echo "Health check PASSED: $URL returned $HTTP_CODE in ${RESPONSE_TIME}ms"
            echo "response-time=$RESPONSE_TIME" >> "$GITHUB_OUTPUT"
            echo "status-code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ $ATTEMPT -lt $MAX_RETRIES ]; then
            echo "Waiting ${RETRY_DELAY}s before retry..."
            sleep "$RETRY_DELAY"
          fi
        done

        echo "Health check FAILED after $MAX_RETRIES attempts."
        echo "Last HTTP status: $HTTP_CODE"
        echo "Last body: $(echo "$BODY" | head -5)"
        echo "response-time=0" >> "$GITHUB_OUTPUT"
        echo "status-code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
        exit 1
