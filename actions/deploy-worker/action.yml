name: Deploy CF Worker
description: Deploy a Cloudflare Worker via wrangler deploy

inputs:
  cloudflare-api-token:
    description: Cloudflare scoped API Token (least-privilege)
    required: true
  cloudflare-account-id:
    description: Cloudflare Account ID (skips /memberships call)
    required: false
    default: ''
  working-directory:
    description: Directory with wrangler.toml
    required: false
    default: '.'
  environment:
    description: Target environment (production, staging)
    required: false
    default: production

outputs:
  worker-url:
    description: Deployed worker URL
    value: ${{ steps.deploy.outputs.worker-url }}
  worker-version:
    description: Deployed worker version ID
    value: ${{ steps.deploy.outputs.worker-version }}

runs:
  using: composite
  steps:
    - name: Validate wrangler.toml exists
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ ! -f wrangler.toml ]; then
          echo "ERROR: wrangler.toml not found in ${{ inputs.working-directory }}"
          exit 1
        fi

    - name: Deploy Worker
      id: deploy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
      run: |
        DEPLOY_OUTPUT=$(npx wrangler deploy --env "${{ inputs.environment }}" 2>&1) || true
        echo "$DEPLOY_OUTPUT"

        # Fail explicitly if wrangler reported an error
        if echo "$DEPLOY_OUTPUT" | grep -qiE "✘.*ERROR|fatal|Authentication error"; then
          echo "::error::Wrangler deploy failed. See output above."
          exit 1
        fi

        # Extract version ID from wrangler output
        VERSION=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Version ID: \K[a-f0-9-]+' | head -1 || echo "unknown")

        # Extract worker name robustly via node (avoids sed/grep fragility with TOML)
        WORKER_NAME=$(node -e "
          const fs = require('fs');
          const toml = fs.readFileSync('wrangler.toml', 'utf8');
          const match = toml.match(/^name\s*=\s*[\"']?([^\"'\s]+)[\"']?/m);
          console.log(match ? match[1] : '');
        " 2>/dev/null || echo "")

        if [ -z "$WORKER_NAME" ]; then
          echo "ERROR: Could not extract 'name' from wrangler.toml"
          exit 1
        fi

        echo "worker-version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "worker-url=https://${WORKER_NAME}.sennacc-api.workers.dev" >> "$GITHUB_OUTPUT"
        echo "Deployed: $WORKER_NAME (version: $VERSION)"
